<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Shinigami Vault</title>

    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
    <link rel="icon" href="assets/logo.png" />
</head>
<body>

    <!-- HEADER -->
    <header class="header">
        <div class="brand-name">
            <h1>SHINIGAMI VAULT</h1>
        </div>

        <nav class="brand-headers">
            <a href="#">HOME</a>
            <a href="#">OVERSIZED</a>
            <a href="#">COLLECTIONS</a>
            <a href="#">DISCOVER US</a>
        </nav>

        <div class="header-btns">
            <i class="bi bi-search"></i>
            <i class="bi bi-heart"></i>
            <i class="bi bi-bag"></i>
            <i class="bi bi-person"></i>
        </div>
    </header>

    <!-- HERO -->
    <section class="hero-section">
        <div class="hero-box">

            <!-- arrows -->
            <button class="hero-arrow left" type="button" onclick="prevSlide()">
                <i class="bi bi-chevron-left"></i>
            </button>

            <button class="hero-arrow right" type="button" onclick="nextSlide()">
                <i class="bi bi-chevron-right"></i>
            </button>

            <!-- slide 1 -->
            <div class="slide slide-one active">
                <div class="hero-left">
                    <div class="hero-text">
                        <h2>New ryomen Sukuna oversized tees out now !!</h2>
                        <p>GRAB YOUR TEE BEFORE IT’S LATE</p>
                        <a href="#" class="hero-btn">VIEW COLLECTION</a>
                    </div>
                </div>

                <div class="hero-right">
                    <img src="assets/Shinigami_vault-removebg-preview.png" alt="Sukuna model tee" />
                </div>
            </div>

            <!-- slide 2 -->
            <div class="slide slide-two">
                <div class="hero-left image-left">
                    <img src="assets/9-removebg-preview.png" alt="Sukuna tee product" />
                </div>

                <div class="hero-right text-right">
                    <div class="hero-text center-text">
                        <h2>JUJUTSU KAISEN<br>X<br>STREETWEAR OVERSIZED TEES</h2>
                        <p>FASHION BEYOND THE ORDINARY</p>
                        <a href="#" class="hero-btn">VIEW COLLECTION</a>
                    </div>
                </div>
            </div>

            <!-- dots -->
            <div class="hero-dots">
                <span class="dot active" onclick="goToSlide(0)"></span>
                <span class="dot" onclick="goToSlide(1)"></span>
            </div>

        </div>
    </section>
    <script src="js/main.js"></script>
</body>
</html>
