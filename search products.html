<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>All Products | Shinigami Vault</title>

    <link rel="stylesheet" href="css/search product.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
    <link rel="icon" href="assets/logo.png" />
</head>
<body>

    <!-- HEADER -->
    <header class="header">
        <div class="brand-name">
            <h1>SHINIGAMI VAULT</h1>
        </div>

        <nav class="brand-headers">
            <a href="home.html">HOME</a>
            <a href="#">OVERSIZED</a>
            <a href="#">COLLECTIONS</a>
            <a href="#">DISCOVER US</a>
        </nav>

        <div class="header-btns">
            <i class="bi bi-search"></i>
            <i class="bi bi-heart"></i>
            <i class="bi bi-bag"></i>
            <i class="bi bi-person"></i>
        </div>
    </header>

    <!-- PAGE -->
    <section class="products-page">

        <div class="top-row">
            <div class="page-heading">
                <h2>All products</h2>
            </div>

            <div class="search-box">
                <input type="text" id="searchInput" placeholder="SEARCH YOUR TEE" onkeyup="searchProducts()" />
                <button type="button" aria-label="Search">
                    <i class="bi bi-search"></i>
                </button>
            </div>

            <div class="stock-text">
                <span>IN STOCK</span>
            </div>
        </div>

        <div class="second-row">
            <p class="results-label">SEARCH RESULTS:</p>

            <div class="filter-wrap">
                <button class="filter-toggle" type="button" onclick="toggleDropdown()">
                    FILER BY ↓
                </button>

                <div class="filter-dropdown" id="filterDropdown">
                    <button type="button" onclick="sortProducts('low-high')">FROM LOW PRICE TO HIGH</button>
                    <button type="button" onclick="sortProducts('high-low')">FROM HIGH PRICE TO LOW</button>
                    <button type="button" onclick="sortProducts('new-old')">FROM NEW TO OLD</button>
                    <button type="button" onclick="sortProducts('old-new')">FROM OLD TO NEW</button>
                </div>
            </div>
        </div>

        <div class="products-grid" id="productsGrid">

            <div class="product-card" data-name="JUJUTSU KAISEN GOJO SATORU OVERSIZED TEE" data-price="2200" data-order="3">
                <div class="product-image-box">
                    <img src="assets/gojo-tee.png" alt="Gojo Tee" />
                </div>
                <h3>JUJUTSU KAISEN | GOJO SATORU OVERSIZED TEE</h3>
                <p class="price">LKR. 2200.00</p>
                <button class="bag-btn" type="button">ADD TO BAG</button>
            </div>

            <div class="product-card" data-name="JUJUTSU KAISEN GOJO SATORU OVERSIZED TEE" data-price="2200" data-order="2">
                <div class="product-image-box">
                    <img src="assets/gojo-tee.png" alt="Gojo Tee" />
                </div>
                <h3>JUJUTSU KAISEN | GOJO SATORU OVERSIZED TEE</h3>
                <p class="price">LKR. 2200.00</p>
                <button class="bag-btn" type="button">ADD TO BAG</button>
            </div>

            <div class="product-card" data-name="JUJUTSU KAISEN GOJO SATORU OVERSIZED TEE" data-price="2200" data-order="1">
                <div class="product-image-box">
                    <img src="assets/gojo-tee.png" alt="Gojo Tee" />
                </div>
                <h3>JUJUTSU KAISEN | GOJO SATORU OVERSIZED TEE</h3>
                <p class="price">LKR. 2200.00</p>
                <button class="bag-btn" type="button">ADD TO BAG</button>
            </div>

        </div>
    </section>

    <script src="js/search product.js"></script>
</body>
</html>
